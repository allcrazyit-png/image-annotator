<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>圖片標注工具</title>
<style>
:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --fg: #111111;
  --muted: #6b6b6b;
  --border: #e5e5e5;
  --accent: #2f6feb;
  --accent-hover: color-mix(in oklab, #2f6feb, black 10%);
  --danger: #dc2626;
  --success: #17a34a;
  --font: "Inter", -apple-system, system-ui, sans-serif;
  --mono: ui-monospace, "JetBrains Mono", monospace;
  --r-sm: 8px;
  --r-md: 12px;
  --fast: 150ms;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  display: flex;
  flex-direction: column;
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  overflow: hidden;
}

/* ── Draft banner ── */
#draft-banner {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: #eff6ff;
  border-bottom: 1px solid #bfdbfe;
  font-size: 13px;
  flex-shrink: 0;
}
#draft-banner.show { display: flex; }
#draft-banner span { flex: 1; color: #1e40af; }
#draft-banner button {
  padding: 4px 12px; font-size: 12px; border-radius: 6px;
  border: 1px solid #93c5fd; background: white; cursor: pointer; color: #1e40af;
}
#draft-banner .dismiss { border-color: var(--border); color: var(--muted); }

/* ── App shell ── */
#app {
  flex: 1;
  min-height: 0;
  display: flex;
}

/* ── Desktop sidebar ── */
#sidebar {
  width: 56px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 0;
  gap: 2px;
  flex-shrink: 0;
  overflow-y: auto;
  scrollbar-width: none;
}
#sidebar::-webkit-scrollbar { display: none; }

.tool-btn {
  width: 40px; height: 40px;
  border: none; background: transparent; border-radius: var(--r-sm);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: background var(--fast), color var(--fast);
  flex-shrink: 0;
}
.tool-btn:hover { background: var(--bg); color: var(--fg); }
.tool-btn.active { background: var(--accent); color: white; }
.tool-btn svg { width: 19px; height: 19px; }
.tool-sep { width: 28px; height: 1px; background: var(--border); margin: 3px 0; flex-shrink: 0; }

/* ── Editor ── */
#editor { flex: 1; min-width: 0; display: flex; flex-direction: column; }

#canvas-wrapper {
  flex: 1; min-height: 0;
  overflow: auto;
  display: flex; align-items: center; justify-content: center;
  background: #c8c8c8;
  background-image: repeating-conic-gradient(#b8b8b8 0% 25%, #c8c8c8 0% 50%) 0 0 / 20px 20px;
  position: relative;
}
#canvas-wrapper.drag-over { outline: 3px dashed var(--accent); outline-offset: -3px; }

#main-canvas {
  display: block;
  max-width: 100%; max-height: 100%;
  cursor: crosshair;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Upload prompt ── */
#upload-prompt {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted);
  pointer-events: none;
}
#upload-prompt.hidden { display: none; }
#upload-prompt svg { opacity: 0.35; }
#upload-prompt h2 { font-size: 17px; font-weight: 600; color: var(--fg); }
#upload-prompt p { font-size: 13px; }
#upload-prompt .upload-cta { pointer-events: all; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; background: var(--accent); color: white;
  border: none; border-radius: var(--r-sm);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background var(--fast);
}
.btn-primary:hover { background: var(--accent-hover); }

/* ── Right options panel ── */
#opts {
  width: 216px; flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; scrollbar-width: thin;
}
.sect {
  padding: 12px; border-bottom: 1px solid var(--border);
}
.sect-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted); margin-bottom: 8px;
}

/* Colors */
.color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 6px; }
.csw {
  aspect-ratio: 1; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: transform var(--fast);
}
.csw:hover { transform: scale(1.15); }
.csw.sel { border-color: var(--fg); }
input[type="color"]#custom-col {
  width: 100%; height: 30px; border: 1px solid var(--border);
  border-radius: var(--r-sm); cursor: pointer; padding: 2px; background: var(--bg);
}

/* Sliders */
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row input[type="range"] { flex: 1; accent-color: var(--accent); }
.sval { font-size: 12px; color: var(--muted); min-width: 22px; text-align: right; font-family: var(--mono); }

/* Buttons */
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-s {
  flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--surface); color: var(--fg); cursor: pointer;
  transition: background var(--fast); min-width: 58px; text-align: center;
  white-space: nowrap;
}
.btn-s:hover { background: var(--bg); }
.btn-s.prime { background: var(--accent); color: white; border-color: var(--accent); }
.btn-s.prime:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-s.red { color: var(--danger); }
.btn-s.red:hover { background: #fef2f2; }

/* ── Text modal ── */
#text-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); align-items: center; justify-content: center;
  z-index: 200;
}
#text-modal.show { display: flex; }
#text-box {
  background: var(--surface); border-radius: var(--r-md);
  padding: 20px; width: 300px; max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
#text-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
#text-field {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  font-size: 14px; font-family: var(--font); margin-bottom: 12px;
  outline: none; transition: border-color var(--fast);
}
#text-field:focus { border-color: var(--accent); }
#text-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Floating Delete Button ── */
#floating-delete-btn {
  display: none;
  position: absolute;
  right: 16px;
  bottom: 16px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--danger);
  color: white;
  box-shadow: 0 4px 12px rgba(220,38,38,0.35);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: transform var(--fast), background var(--fast);
}
#floating-delete-btn:hover {
  background: #b91c1c;
  transform: scale(1.08);
}
#floating-delete-btn:active {
  transform: scale(0.92);
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(17,17,17,0.9); color: white;
  padding: 8px 16px; border-radius: 20px;
  font-size: 13px; opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 300; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Mobile toolbar ── */
#mobile-bar {
  display: none;
  background: var(--surface); border-top: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 0 8px; flex-shrink: 0; height: 68px;
  align-items: center;
  gap: 6px;
}
#mobile-bar::-webkit-scrollbar { display: none; }

.m-btn {
  flex-shrink: 0; width: 56px; height: 56px; border: none;
  background: transparent; border-radius: var(--r-sm); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; color: var(--muted); font-size: 11px; font-weight: 500;
  transition: color var(--fast), background var(--fast);
}
.m-btn:active { background: rgba(0, 0, 0, 0.05); }
.m-btn svg { width: 22px; height: 22px; }
.m-btn.active { color: var(--accent); }
.m-sep { flex-shrink: 0; width: 1px; height: 32px; background: var(--border); margin: 0 4px; }

/* ── Mobile options row ── */
#mobile-opts {
  display: none; flex-shrink: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 8px 12px; gap: 12px; align-items: center;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  height: 60px;
}
#mobile-opts::-webkit-scrollbar { display: none; }
.m-csw {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent; transition: transform var(--fast);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.m-csw:active { transform: scale(0.9); }
.m-csw.sel { border-color: var(--fg); border-width: 3px; }
#m-stroke { flex: 0 0 100px; accent-color: var(--accent); }
.m-act-btn {
  flex-shrink: 0; padding: 6px 12px; font-size: 12px;
  border: 1px solid var(--border); border-radius: var(--r-sm);
  background: var(--surface); cursor: pointer; white-space: nowrap;
  height: 34px; display: inline-flex; align-items: center; justify-content: center;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  #sidebar { display: none; }
  #opts { display: none; }
  #mobile-bar { display: flex; }
  #mobile-opts { display: flex; }
  #toast { bottom: 144px; }
}
</style>
</head>
<body>

<!-- Draft restore banner -->
<div id="draft-banner">
  <span id="draft-msg">發現未完成的草稿，是否繼續編輯？</span>
  <button onclick="restoreDraft()">繼續編輯</button>
  <button class="dismiss" onclick="dismissDraft()">略過</button>
</div>

<!-- App -->
<div id="app">

  <!-- Desktop sidebar -->
  <aside id="sidebar">
    <button class="tool-btn" onclick="triggerUpload()" title="上傳圖片（拍照 / 選照片）">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21,15 16,10 5,21"/>
      </svg>
    </button>
    <div class="tool-sep"></div>

    <button class="tool-btn" data-tool="select" onclick="setTool('select')" title="選擇與移動 (鍵盤 Delete 刪除)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
        <path d="M13 13l6 6"/>
      </svg>
    </button>
    <button class="tool-btn active" data-tool="arrow" onclick="setTool('arrow')" title="箭頭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="19" x2="19" y2="5"/>
        <polyline points="9,5 19,5 19,15"/>
      </svg>
    </button>
    <button class="tool-btn" data-tool="text" onclick="setTool('text')" title="文字標籤">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="4,7 4,4 20,4 20,7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
    </button>
    <button class="tool-btn" data-tool="circle" onclick="setTool('circle')" title="圓圈 / 橢圓">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <ellipse cx="12" cy="12" rx="10" ry="7"/>
      </svg>
    </button>
    <button class="tool-btn" data-tool="rect" onclick="setTool('rect')" title="矩形框選">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="5" width="18" height="14" rx="1"/>
      </svg>
    </button>
    <button class="tool-btn" data-tool="freehand" onclick="setTool('freehand')" title="自由手繪">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 20 C6 16 8 13 11 14 S16 17 19 14 S22 8 21 6"/>
      </svg>
    </button>
    <button class="tool-btn" data-tool="highlight" onclick="setTool('highlight')" title="螢光筆">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 5L19 9L9 19L4 20L5 15Z"/>
        <line x1="15" y1="5" x2="19" y2="9"/>
      </svg>
    </button>
    <button class="tool-btn" data-tool="number" onclick="setTool('number')" title="數字編號標記">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="9"/>
        <text x="12" y="16.5" text-anchor="middle" fill="currentColor" font-size="10" font-weight="700" stroke="none" font-family="system-ui">1</text>
      </svg>
    </button>
    <button class="tool-btn" data-tool="mosaic" onclick="setTool('mosaic')" title="馬賽克遮罩">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="3" width="4" height="4" opacity=".35"/>
        <rect x="10" y="3" width="4" height="4" opacity=".75"/>
        <rect x="17" y="3" width="4" height="4" opacity=".35"/>
        <rect x="3" y="10" width="4" height="4" opacity=".75"/>
        <rect x="10" y="10" width="4" height="4"/>
        <rect x="17" y="10" width="4" height="4" opacity=".75"/>
        <rect x="3" y="17" width="4" height="4" opacity=".35"/>
        <rect x="10" y="17" width="4" height="4" opacity=".75"/>
        <rect x="17" y="17" width="4" height="4" opacity=".35"/>
      </svg>
    </button>

    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="undo()" title="復原 (Ctrl+Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="9,14 4,9 9,4"/>
        <path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
      </svg>
    </button>
    <button class="tool-btn" onclick="redo()" title="重做 (Ctrl+Y)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="15,14 20,9 15,4"/>
        <path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
      </svg>
    </button>
    <button class="tool-btn" onclick="clearAll()" title="清除全部標注" style="color:var(--danger)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="3,6 5,6 21,6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6m4-6v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </aside>

  <!-- Canvas editor -->
  <div id="editor">
    <div id="canvas-wrapper">
      <div id="upload-prompt">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <h2>上傳圖片開始標注</h2>
        <p>支援 JPG、PNG、WebP — 可直接拖放或拍照</p>
        <div class="upload-cta">
          <button class="btn-primary" onclick="triggerUpload()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17,8 12,3 7,8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            選擇圖片
          </button>
        </div>
      </div>
      <canvas id="main-canvas"></canvas>
      <!-- Floating action bar (shown when annotation is selected) -->
      <div id="floating-action-bar" style="
        display:none; position:absolute; z-index:150;
        transform:translateX(-50%); pointer-events:all;
      ">
        <div style="
          background:#1c1c1e; border-radius:8px; padding:5px 10px;
          display:flex; gap:8px; box-shadow:0 3px 12px rgba(0,0,0,0.35);
          align-items:center;
        ">
          <button id="fab-edit" onclick="editSelectedText()" style="
            display:none; font-size:12px; color:white;
            background:rgba(59,130,246,0.7); border:none;
            border-radius:5px; padding:5px 10px; cursor:pointer; font-weight:600;
          ">✏ 編輯</button>
          <button id="fab-delete" onclick="deleteSelected()" style="
            font-size:12px; color:white;
            background:rgba(239,68,68,0.7); border:none;
            border-radius:5px; padding:5px 10px; cursor:pointer; font-weight:600;
          ">✕ 刪除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Desktop options panel -->
  <aside id="opts">
    <div class="sect">
      <div id="panel-context-label" class="sect-label" style="color:var(--muted); margin-bottom:4px; font-size:9px;">下一個標注的設定</div>
      <div class="sect-label">顏色</div>
      <div class="color-grid" id="color-grid"></div>
      <input type="color" id="custom-col" value="#FF3B30" title="自訂顏色">
    </div>
    <div class="sect">
      <div class="sect-label">線條粗細</div>
      <div class="slider-row">
        <input type="range" id="stroke-w" min="1" max="24" value="6">
        <span class="sval" id="stroke-v">6</span>
      </div>
    </div>
    <div class="sect">
      <div class="sect-label">文字大小</div>
      <div class="slider-row">
        <input type="range" id="font-sz" min="12" max="350" value="180">
        <span class="sval" id="font-v">180</span>
      </div>
    </div>
    <div class="sect" id="panel-edit-sect" style="display:none;">
      <div class="sect-label">選取操作</div>
      <div class="btn-row">
        <button id="panel-edit-btn" class="btn-s prime" onclick="editSelectedText()" style="display:none;">✏ 編輯文字</button>
        <button class="btn-s red" onclick="deleteSelected()">✕ 刪除</button>
      </div>
    </div>
    <div class="sect">
      <div class="sect-label">草稿</div>
      <div class="btn-row">
        <button class="btn-s prime" onclick="saveDraft()">儲存草稿</button>
        <button class="btn-s red" onclick="clearDraft()">刪除草稿</button>
      </div>
    </div>
    <div class="sect">
      <div class="sect-label">匯出 / 分享</div>
      <div class="btn-row">
        <button class="btn-s prime" onclick="doDownload()">↓ 下載 PNG</button>
      </div>
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn-s" onclick="doShare()">↑ 分享圖片</button>
        <button class="btn-s" onclick="doCopy()">複製</button>
      </div>
    </div>
    <div class="sect" style="border-bottom:none; padding-bottom: 4px;">
      <div class="sect-label">快捷鍵</div>
      <div style="font-size:11px; color:var(--muted); line-height:1.7;">
        Ctrl+Z 復原<br>Ctrl+Y 重做<br>拖放圖片到畫面
      </div>
    </div>
    <div style="padding: 12px; margin-top: auto; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
      <span>版本：v1.2.0 (穩定版)</span>
      <span style="background: #eff6ff; color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 600; font-family: var(--mono);">PRO</span>
    </div>
  </aside>
</div>

<!-- Mobile toolbar -->
<div id="mobile-bar">
  <button class="m-btn" onclick="triggerUpload()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    上傳
  </button>
  <div class="m-sep"></div>
  <button class="m-btn" data-tool="select" onclick="setTool('select')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/>
    </svg>
    選擇
  </button>
  <button class="m-btn active" data-tool="arrow" onclick="setTool('arrow')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9,5 19,5 19,15"/></svg>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">

<!-- Toast -->
<div id="toast"></div>

<script>
// ─── Palette ──────────────────────────────────────────────────────────────────
const PALETTE = [
  '#FF3B30','#FF9500','#FFCC00','#34C759',
  '#007AFF','#5856D6','#FF2D55','#000000',
  '#FFFFFF','#8E8E93',
];

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  img: null, annotations: [],
  undoStack: [], redoStack: [],
  tool: 'arrow', color: '#FF3B30',
  strokeW: 6, fontSize: 180,
  drawing: false, x0: 0, y0: 0,
  pts: [], numCount: 1,
  pendTx: 0, pendTy: 0,
  // Selection state
  selectedIdx: -1,
  isDraggingSelected: false,
  dragStartX: 0, dragStartY: 0,
  hasMovedSelected: false,
  isResizingSelected: false,
  activeHandle: null,
  initAnno: null,
  initBox: null,
  editingIdx: -1        // -1 = 新增文字；>= 0 = 編輯第 N 個標注
};

// ─── DOM ──────────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('main-canvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('canvas-wrapper');
const upPmt   = document.getElementById('upload-prompt');
const txtModal= document.getElementById('text-modal');
const txtFld  = document.getElementById('text-field');
const toastEl = document.getElementById('toast');
const fabBar    = document.getElementById('floating-action-bar');
const fabEdit   = document.getElementById('fab-edit');
const fabDelete = document.getElementById('fab-delete');

// ─── Boot ─────────────────────────────────────────────────────────────────────
(function init() {
  buildPalette();
  wireControls();
  wireCanvas();
  canvas.style.display = 'none';
  checkDraftBanner();
})();

// ─── Palette UI ───────────────────────────────────────────────────────────────
function buildPalette() {
  [document.getElementById('color-grid'), document.getElementById('m-color-row')].forEach((el, idx) => {
    PALETTE.forEach(c => {
      const sw = document.createElement('div');
      sw.className = (idx === 0 ? 'csw' : 'm-csw') + (c === S.color ? ' sel' : '');
      sw.style.background = c;
      if (c === '#FFFFFF') sw.style.boxShadow = 'inset 0 0 0 1px #ddd';
      sw.dataset.c = c;
      sw.onclick = () => pickColor(c);
      el.appendChild(sw);
    });
  });
  document.getElementById('custom-col').addEventListener('input', e => pickColor(e.target.value));
  document.getElementById('m-custom-col').addEventListener('input', e => pickColor(e.target.value));
}

function pickColor(c) {
  S.color = c;
  document.querySelectorAll('.csw, .m-csw').forEach(sw => sw.classList.toggle('sel', sw.dataset.c === c));
  document.getElementById('custom-col').value = c;
  document.getElementById('m-custom-col').value = c;
  if (S.selectedIdx !== -1) {
    pushUndo();
    updateSelectedProperty('color', c);
  }
}

// ─── Control bindings ─────────────────────────────────────────────────────────
function wireControls() {
  const sw = document.getElementById('stroke-w'), sv = document.getElementById('stroke-v');
  const sliderStartDrag = () => { if (S.selectedIdx !== -1) pushUndo(); };
  sw.addEventListener('mousedown', sliderStartDrag);
  sw.addEventListener('touchstart', sliderStartDrag);
  sw.addEventListener('input', e => {
    S.strokeW = +e.target.value; sv.textContent = e.target.value;
    document.getElementById('m-stroke').value = e.target.value;
    document.getElementById('m-stroke-v').textContent = e.target.value;
    if (S.selectedIdx !== -1) updateSelectedProperty('strokeW', +e.target.value);
  });
  const fs = document.getElementById('font-sz'), fv = document.getElementById('font-v');
  fs.addEventListener('mousedown', sliderStartDrag);
  fs.addEventListener('touchstart', sliderStartDrag);
  fs.addEventListener('input', e => {
    S.fontSize = +e.target.value; fv.textContent = e.target.value;
    if (S.selectedIdx !== -1) updateSelectedProperty('fontSize', +e.target.value);
  });
  const ms = document.getElementById('m-stroke');
  ms.addEventListener('mousedown', sliderStartDrag);
  ms.addEventListener('touchstart', sliderStartDrag);
  ms.addEventListener('input', e => {
    S.strokeW = +e.target.value;
    sw.value = e.target.value; sv.textContent = e.target.value;
    document.getElementById('m-stroke-v').textContent = e.target.value;
    if (S.selectedIdx !== -1) updateSelectedProperty('strokeW', +e.target.value);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (S.tool === 'select' && S.selectedIdx !== -1) {
        e.preventDefault();
        deleteSelected();
      }
    }
  });

  // Drag & drop
  wrapper.addEventListener('dragover', e => { e.preventDefault(); wrapper.classList.add('drag-over'); });
  wrapper.addEventListener('dragleave', () => wrapper.classList.remove('drag-over'));
  wrapper.addEventListener('drop', e => {
    e.preventDefault(); wrapper.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
}

// ─── Tool ─────────────────────────────────────────────────────────────────────
function setTool(t) {
  S.tool = t;
  S.selectedIdx = -1;
  document.querySelectorAll('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  canvas.style.cursor = t === 'select' ? 'default' : t === 'text' ? 'text' : 'crosshair';
  render();
}

// ─── File loading ─────────────────────────────────────────────────────────────
function triggerUpload() { document.getElementById('file-input').click(); }
function handleFile(inp) { if (inp.files[0]) loadFile(inp.files[0]); }
function loadFile(file) {
  const r = new FileReader();
  r.onload = e => loadURL(e.target.result, true);
  r.readAsDataURL(file);
}

function loadURL(url, resetAnno) {
  const img = new Image();
  img.onload = () => {
    S.img = img;
    if (resetAnno) {
      S.annotations = []; S.undoStack = []; S.redoStack = []; S.numCount = 1;
    }
    const MAX = 4096;
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
    canvas.width = w; canvas.height = h;
    canvas.style.display = 'block';
    upPmt.classList.add('hidden');
    render();
  };
  img.src = url;
}

// ─── Canvas coords ────────────────────────────────────────────────────────────
function pt(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  // touchend: e.touches is empty; use changedTouches instead
  const src = (e.touches && e.touches.length > 0)
    ? e.touches[0]
    : (e.changedTouches && e.changedTouches.length > 0)
      ? e.changedTouches[0]
      : e;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

// ─── Canvas events ────────────────────────────────────────────────────────────
function wireCanvas() {
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', e => { if (S.drawing) onUp(e); });
  canvas.addEventListener('touchstart',  e => { e.preventDefault(); onDown(e); }, { passive: false });
  canvas.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e); }, { passive: false });
  canvas.addEventListener('touchend',    e => { e.preventDefault(); onUp(e);   }, { passive: false });
  canvas.addEventListener('touchcancel', e => { e.preventDefault(); S.drawing = false; render(); }, { passive: false });
}

function onDown(e) {
  if (!S.img) return;
  const p = pt(e);

  // ── 文字工具：點選位置，開啟輸入彈窗 ──
  if (S.tool === 'text') {
    // 如果點到現有文字標注，改為編輯它
    const hitIdx = findHitAnnotation(p);
    if (hitIdx !== -1 && S.annotations[hitIdx].type === 'text') {
      selectAnnotation(hitIdx);
      editSelectedText();
      return;
    }
    S.pendTx = p.x; S.pendTy = p.y;
    S.editingIdx = -1;
    txtFld.value = '';
    txtModal.classList.add('show');
    setTimeout(() => txtFld.focus(), 60);
    return;
  }

  // ── 數字編號工具 ──
  if (S.tool === 'number') {
    pushUndo();
    S.annotations.push({ type:'num', x:p.x, y:p.y, n:S.numCount++, color:S.color, r:Math.max(16, S.strokeW * 5) });
    S.selectedIdx = S.annotations.length - 1;
    syncControlsFromSelected();
    render();
    return;
  }

  // ── 通用命中偵測（適用所有工具，含 select 和繪圖工具）──
  // 先檢查縮放把手（如果目前有選取）
  if (S.selectedIdx !== -1) {
    const box = getBoundingBox(S.annotations[S.selectedIdx]);
    if (box) {
      const handle = findHitHandle(p, box);
      if (handle) {
        S.isResizingSelected = true;
        S.activeHandle = handle;
        S.initAnno = JSON.parse(JSON.stringify(S.annotations[S.selectedIdx]));
        S.initBox = box;
        pushUndo();
        return;
      }
    }
  }

  // 檢查是否點到既有標注
  const hitIdx = findHitAnnotation(p);
  if (hitIdx !== -1) {
    selectAnnotation(hitIdx);
    S.isDraggingSelected = true;
    S.dragStartX = p.x;
    S.dragStartY = p.y;
    S.hasMovedSelected = false;
    canvas.style.cursor = 'move';
    return;
  }

  // 點到空白處：解除選取
  if (S.selectedIdx !== -1) {
    S.selectedIdx = -1;
    render();
  }

  // select 工具點到空白處就結束
  if (S.tool === 'select') return;

  // ── 開始繪圖 ──
  S.drawing = true;
  S.x0 = p.x; S.y0 = p.y;
  S.pts = [{ x:p.x, y:p.y }];
}

function onMove(e) {
  const p = pt(e);
  
  if (S.isResizingSelected && S.selectedIdx !== -1) {
    const a = S.annotations[S.selectedIdx];
    const initA = S.initAnno;
    const box = S.initBox;
    const handle = S.activeHandle;
    
    let fx, fy, iax, iay;
    if (handle === 'tl') {
      fx = box.maxX; fy = box.maxY; iax = box.minX; iay = box.minY;
    } else if (handle === 'tr') {
      fx = box.minX; fy = box.maxY; iax = box.maxX; iay = box.minY;
    } else if (handle === 'bl') {
      fx = box.maxX; fy = box.minY; iax = box.minX; iay = box.maxY;
    } else if (handle === 'br') {
      fx = box.minX; fy = box.minY; iax = box.maxX; iay = box.maxY;
    }
    
    switch (a.type) {
      case 'rect':
      case 'circle': {
        const isX1Active = Math.abs(initA.x1 - iax) < Math.abs(initA.x2 - iax);
        const isY1Active = Math.abs(initA.y1 - iay) < Math.abs(initA.y2 - iay);
        if (isX1Active) a.x1 = p.x; else a.x2 = p.x;
        if (isY1Active) a.y1 = p.y; else a.y2 = p.y;
        break;
      }
      case 'arrow': {
        const isStartActive = Math.hypot(initA.x1 - iax, initA.y1 - iay) < Math.hypot(initA.x2 - iax, initA.y2 - iay);
        if (isStartActive) {
          a.x1 = p.x; a.y1 = p.y;
        } else {
          a.x2 = p.x; a.y2 = p.y;
        }
        break;
      }
      case 'mosaic': {
        const minX = Math.min(fx, p.x), maxX = Math.max(fx, p.x);
        const minY = Math.min(fy, p.y), maxY = Math.max(fy, p.y);
        a.x = minX; a.w = Math.max(4, maxX - minX);
        a.y = minY; a.h = Math.max(4, maxY - minY);
        break;
      }
      case 'text': {
        const distInit = Math.hypot(iax - fx, iay - fy);
        const distCurr = Math.hypot(p.x - fx, p.y - fy);
        const scale = distInit > 0 ? distCurr / distInit : 1;
        a.fs = Math.max(12, Math.min(350, Math.round(initA.fs * scale)));
        a.x = fx + (initA.x - fx) * (a.fs / initA.fs);
        a.y = fy + (initA.y - fy) * (a.fs / initA.fs);
        
        document.getElementById('font-sz').value = a.fs;
        document.getElementById('font-v').textContent = a.fs;
        break;
      }
      case 'num': {
        const dist = Math.hypot(p.x - initA.x, p.y - initA.y);
        a.r = Math.max(12, Math.min(120, Math.round(dist / Math.sqrt(2))));
        const strokeVal = Math.max(1, Math.min(24, Math.round(a.r / 5)));
        document.getElementById('stroke-w').value = strokeVal;
        document.getElementById('stroke-v').textContent = strokeVal;
        document.getElementById('m-stroke').value = strokeVal;
        document.getElementById('m-stroke-v').textContent = strokeVal;
        break;
      }
      case 'free':
      case 'hi': {
        const dxInit = iax - fx;
        const dyInit = iay - fy;
        const sx = dxInit !== 0 ? (p.x - fx) / dxInit : 1;
        const sy = dyInit !== 0 ? (p.y - fy) / dyInit : 1;
        a.pts.forEach((pt, idx) => {
          pt.x = fx + (initA.pts[idx].x - fx) * sx;
          pt.y = fy + (initA.pts[idx].y - fy) * sy;
        });
        break;
      }
    }
    render();
    return;
  }
  
  if (S.isDraggingSelected && S.selectedIdx !== -1) {
    const dx = p.x - S.dragStartX;
    const dy = p.y - S.dragStartY;
    if (dx !== 0 || dy !== 0) {
      if (!S.hasMovedSelected) {
        pushUndo();
        S.hasMovedSelected = true;
      }
      const a = S.annotations[S.selectedIdx];
      if (a.type === 'text' || a.type === 'num' || a.type === 'mosaic') {
        a.x += dx; a.y += dy;
      } else if (a.type === 'arrow' || a.type === 'circle' || a.type === 'rect') {
        a.x1 += dx; a.y1 += dy;
        a.x2 += dx; a.y2 += dy;
      } else if (a.type === 'free' || a.type === 'hi') {
        a.pts.forEach(pt => { pt.x += dx; pt.y += dy; });
      }
      S.dragStartX = p.x;
      S.dragStartY = p.y;
      render();
    }
    return;
  }
  
  if (!S.isResizingSelected && !S.isDraggingSelected && S.selectedIdx !== -1) {
    const box = getBoundingBox(S.annotations[S.selectedIdx]);
    if (box) {
      const handle = findHitHandle(p, box);
      if (handle) {
        if (handle === 'tl' || handle === 'br') {
          canvas.style.cursor = 'nwse-resize';
        } else {
          canvas.style.cursor = 'nesw-resize';
        }
        return;
      }
    }
    if (checkHit(S.annotations[S.selectedIdx], p)) {
      canvas.style.cursor = 'move';
      return;
    }
    canvas.style.cursor = S.tool === 'select' ? 'default' : 'crosshair';
  }

  if (!S.drawing || !S.img) return;
  if (S.tool === 'freehand' || S.tool === 'highlight') S.pts.push({ x:p.x, y:p.y });
  render(p);
}

function onUp(e) {
  if (S.tool === 'select' || S.isDraggingSelected || S.isResizingSelected) {
    S.isDraggingSelected = false;
    S.isResizingSelected = false;
    canvas.style.cursor = S.tool === 'select' ? 'default' : 'crosshair';
    return;
  }
  if (!S.drawing) return;
  S.drawing = false;
  const p = pt(e);
  const dx = p.x - S.x0, dy = p.y - S.y0;
  if (Math.hypot(dx, dy) < 3 && S.tool !== 'freehand' && S.tool !== 'highlight') { render(); return; }
  pushUndo();
  switch (S.tool) {
    case 'arrow':
      S.annotations.push({ type:'arrow', x1:S.x0, y1:S.y0, x2:p.x, y2:p.y, color:S.color, w:S.strokeW }); break;
    case 'circle':
      S.annotations.push({ type:'circle', x1:S.x0, y1:S.y0, x2:p.x, y2:p.y, color:S.color, w:S.strokeW }); break;
    case 'rect':
      S.annotations.push({ type:'rect', x1:S.x0, y1:S.y0, x2:p.x, y2:p.y, color:S.color, w:S.strokeW }); break;
    case 'freehand':
      if (S.pts.length > 1) S.annotations.push({ type:'free', pts:[...S.pts], color:S.color, w:S.strokeW }); break;
    case 'highlight':
      if (S.pts.length > 1) S.annotations.push({ type:'hi', pts:[...S.pts], color:S.color, w:Math.max(S.strokeW*6,24) }); break;
    case 'mosaic':
      { const mx=Math.min(S.x0,p.x), my=Math.min(S.y0,p.y), mw=Math.abs(dx), mh=Math.abs(dy);
        if (mw > 4 && mh > 4) S.annotations.push({ type:'mosaic', x:mx, y:my, w:mw, h:mh }); } break;
  }
  // 自動選取剛畫好的標注
  if (S.annotations.length > 0) {
    S.selectedIdx = S.annotations.length - 1;
    syncControlsFromSelected();
  }
  render();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(live) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (S.img) ctx.drawImage(S.img, 0, 0, canvas.width, canvas.height);
  S.annotations.forEach(drawA);
  if (S.drawing && live) { const prev = mkPreview(live); if (prev) drawA(prev); }
  
  // Selection box rendering
  if (S.selectedIdx !== -1) {
    const box = getBoundingBox(S.annotations[S.selectedIdx]);
    if (box) {
      drawSelectionBox(box.minX, box.minY, box.maxX, box.maxY);
      updateSelectionUI(box);
    } else {
      fabBar.style.display = 'none';
    }
  } else {
    fabBar.style.display = 'none';
    document.getElementById('panel-edit-sect').style.display = 'none';
    document.getElementById('panel-context-label').textContent = '下一個標注的設定';
    document.getElementById('m-ctx-label').textContent = '下一個';
    document.getElementById('m-ctx-label').style.color = '#bbb';
    document.getElementById('m-edit-btn').style.display = 'none';
    document.getElementById('m-delete-btn').style.display = 'none';
  }
}

function updateSelectionUI(box) {
  const a = S.annotations[S.selectedIdx];
  if (!a) return;

  // 懸浮操作列定位
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / canvas.width;
  const scaleY = rect.height / canvas.height;
  const midX = ((box.minX + box.maxX) / 2) * scaleX + rect.left - wrapper.getBoundingClientRect().left;
  const topY  = box.minY * scaleY + rect.top - wrapper.getBoundingClientRect().top - 44;

  fabBar.style.left = midX + 'px';
  fabBar.style.top  = Math.max(4, topY) + 'px';
  fabBar.style.display = 'block';

  // 「編輯文字」按鈕只對 text 類型顯示
  const isText = (a.type === 'text');
  fabEdit.style.display = isText ? 'inline-block' : 'none';

  // 右側面板
  const panelEditSect = document.getElementById('panel-edit-sect');
  panelEditSect.style.display = 'block';
  document.getElementById('panel-edit-btn').style.display = isText ? 'block' : 'none';

  const typeNames = { arrow:'箭頭', text:'文字', circle:'圓圈', rect:'矩形', free:'手繪', hi:'螢光', num:'編號', mosaic:'馬賽克' };
  const typeName = typeNames[a.type] || a.type;
  document.getElementById('panel-context-label').textContent = `選取中：${typeName}`;

  // 手機色條
  const mCtxLabel = document.getElementById('m-ctx-label');
  mCtxLabel.textContent = '選取中';
  mCtxLabel.style.color = '#2f6feb';
  document.getElementById('m-edit-btn').style.display = isText ? 'inline-flex' : 'none';
  document.getElementById('m-delete-btn').style.display = 'inline-flex';
}

function drawSelectionBox(minX, minY, maxX, maxY) {
  ctx.save();
  ctx.strokeStyle = '#2f6feb';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([8, 6]);
  ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
  
  // Handles - Circular high-contrast dots
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#2f6feb';
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  const corners = [
    [minX, minY],
    [maxX, minY],
    [minX, maxY],
    [maxX, maxY]
  ];
  corners.forEach(([cx, cy]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });
  ctx.restore();
}

function mkPreview(p) {
  switch (S.tool) {
    case 'arrow':     return { type:'arrow',  x1:S.x0, y1:S.y0, x2:p.x, y2:p.y, color:S.color, w:S.strokeW };
    case 'circle':    return { type:'circle', x1:S.x0, y1:S.y0, x2:p.x, y2:p.y, color:S.color, w:S.strokeW };
    case 'rect':      return { type:'rect',   x1:S.x0, y1:S.y0, x2:p.x, y2:p.y, color:S.color, w:S.strokeW };
    case 'freehand':  return { type:'free',   pts:S.pts, color:S.color, w:S.strokeW };
    case 'highlight': return { type:'hi',     pts:S.pts, color:S.color, w:Math.max(S.strokeW*6,24) };
    case 'mosaic':    return { type:'mosaic', x:Math.min(S.x0,p.x), y:Math.min(S.y0,p.y), w:Math.abs(p.x-S.x0), h:Math.abs(p.y-S.y0) };
    default: return null;
  }
}

function drawA(a) {
  ctx.save();
  switch (a.type) {
    case 'arrow':  rArrow(a);  break;
    case 'text':   rText(a);   break;
    case 'circle': rCircle(a); break;
    case 'rect':   rRect(a);   break;
    case 'free':   rFree(a);   break;
    case 'hi':     rHi(a);     break;
    case 'num':    rNum(a);    break;
    case 'mosaic': rMosaic(a); break;
  }
  ctx.restore();
}

function shadow(blur=3) {
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = blur;
}

function rArrow(a) {
  const ang = Math.atan2(a.y2-a.y1, a.x2-a.x1);
  const hl  = Math.max(12, a.w * 4);
  ctx.strokeStyle = ctx.fillStyle = a.color;
  ctx.lineWidth = a.w; ctx.lineCap = 'round';
  shadow();
  ctx.beginPath(); ctx.moveTo(a.x1, a.y1); ctx.lineTo(a.x2, a.y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(a.x2, a.y2);
  ctx.lineTo(a.x2 - hl*Math.cos(ang - Math.PI/6), a.y2 - hl*Math.sin(ang - Math.PI/6));
  ctx.lineTo(a.x2 - hl*Math.cos(ang + Math.PI/6), a.y2 - hl*Math.sin(ang + Math.PI/6));
  ctx.closePath(); ctx.fill();
}

function rText(a) {
  ctx.font = `bold ${a.fs}px Inter, system-ui, sans-serif`;
  ctx.fillStyle = a.color;
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 5;
  ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
  ctx.fillText(a.text, a.x, a.y);
}

function rCircle(a) {
  const cx=(a.x1+a.x2)/2, cy=(a.y1+a.y2)/2;
  const rx=Math.abs(a.x2-a.x1)/2, ry=Math.abs(a.y2-a.y1)/2;
  ctx.strokeStyle = a.color; ctx.lineWidth = a.w;
  shadow();
  ctx.beginPath(); ctx.ellipse(cx,cy,Math.max(rx,1),Math.max(ry,1),0,0,Math.PI*2); ctx.stroke();
}

function rRect(a) {
  const x=Math.min(a.x1,a.x2), y=Math.min(a.y1,a.y2);
  const w=Math.abs(a.x2-a.x1), h=Math.abs(a.y2-a.y1);
  ctx.strokeStyle = a.color; ctx.lineWidth = a.w;
  shadow();
  ctx.strokeRect(x, y, w, h);
}

function rFree(a) {
  if (!a.pts || a.pts.length < 2) return;
  ctx.strokeStyle = a.color; ctx.lineWidth = a.w;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  shadow(2);
  ctx.beginPath(); ctx.moveTo(a.pts[0].x, a.pts[0].y);
  for (let i=1;i<a.pts.length;i++) ctx.lineTo(a.pts[i].x, a.pts[i].y);
  ctx.stroke();
}

function rHi(a) {
  if (!a.pts || a.pts.length < 2) return;
  ctx.globalAlpha = 0.38;
  ctx.strokeStyle = a.color; ctx.lineWidth = a.w;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(a.pts[0].x, a.pts[0].y);
  for (let i=1;i<a.pts.length;i++) ctx.lineTo(a.pts[i].x, a.pts[i].y);
  ctx.stroke();
}

function rNum(a) {
  ctx.fillStyle = a.color;
  shadow(4);
  ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = a.color === '#FFFFFF' || a.color === '#ffcc00' || a.color === '#FFCC00' ? '#000' : '#fff';
  ctx.font = `bold ${Math.round(a.r * 1.15)}px Inter, system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(String(a.n), a.x, a.y + 1);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function rMosaic(a) {
  if (!S.img || a.w < 4 || a.h < 4) return;
  const bs = Math.max(8, Math.round(Math.min(a.w, a.h) / 8));
  const tmp = document.createElement('canvas');
  tmp.width = a.w; tmp.height = a.h;
  const tc = tmp.getContext('2d');
  tc.drawImage(S.img, a.x, a.y, a.w, a.h, 0, 0, a.w, a.h);
  for (let bx=0; bx<a.w; bx+=bs) {
    for (let by=0; by<a.h; by+=bs) {
      const px = Math.min(bx + (bs>>1), a.w-1);
      const py = Math.min(by + (bs>>1), a.h-1);
      const d = tc.getImageData(px, py, 1, 1).data;
      tc.fillStyle = `rgb(${d[0]},${d[1]},${d[2]})`;
      tc.fillRect(bx, by, bs, bs);
    }
  }
  ctx.drawImage(tmp, a.x, a.y);
}

// ─── Text tool ────────────────────────────────────────────────────────────────
function confirmText() {
  const txt = txtFld.value.trim();
  txtModal.classList.remove('show');
  if (!txt) return;
  pushUndo();
  if (S.editingIdx >= 0) {
    // 編輯既有文字
    S.annotations[S.editingIdx].text = txt;
    S.selectedIdx = S.editingIdx;
    S.editingIdx = -1;
  } else {
    // 新增文字
    S.annotations.push({ type:'text', x:S.pendTx, y:S.pendTy, text:txt, color:S.color, fs:S.fontSize });
    S.selectedIdx = S.annotations.length - 1;
    syncControlsFromSelected();
  }
  render();
}
function cancelText() { txtModal.classList.remove('show'); }
function editSelectedText() {
  if (S.selectedIdx === -1) return;
  const a = S.annotations[S.selectedIdx];
  if (a.type !== 'text') return;
  S.editingIdx = S.selectedIdx;
  txtFld.value = a.text;
  txtModal.classList.add('show');
  setTimeout(() => { txtFld.focus(); txtFld.select(); }, 60);
}
txtFld.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmText();
  if (e.key === 'Escape') cancelText();
});

// ─── Undo / Redo ──────────────────────────────────────────────────────────────
function snap() { return JSON.parse(JSON.stringify({ a: S.annotations, n: S.numCount })); }

function pushUndo() {
  S.undoStack.push(snap());
  S.redoStack = [];
  if (S.undoStack.length > 60) S.undoStack.shift();
}

function undo() {
  if (!S.undoStack.length) { showToast('已是最初狀態'); return; }
  S.redoStack.push(snap());
  const s = S.undoStack.pop();
  S.annotations = s.a; S.numCount = s.n;
  render(); showToast('已復原');
}

function redo() {
  if (!S.redoStack.length) { showToast('沒有可重做的操作'); return; }
  S.undoStack.push(snap());
  const s = S.redoStack.pop();
  S.annotations = s.a; S.numCount = s.n;
  render(); showToast('已重做');
}

function clearAll() {
  if (!S.annotations.length) { showToast('目前沒有標注'); return; }
  if (!confirm('確定清除所有標注？')) return;
  pushUndo();
  S.annotations = []; S.numCount = 1;
  render(); showToast('已清除所有標注');
}

// ─── Export ───────────────────────────────────────────────────────────────────
function needImg() { if (!S.img) { showToast('請先上傳圖片'); return false; } return true; }

function getBlob(cb) { canvas.toBlob(cb, 'image/png'); }

function doDownload() {
  if (!needImg()) return;
  getBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'annotated-' + Date.now() + '.png';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    showToast('圖片已下載');
  });
}

async function doShare() {
  if (!needImg()) return;
  if (!navigator.share) { doDownload(); return; }
  getBlob(async blob => {
    try {
      const file = new File([blob], 'annotated.png', { type: 'image/png' });
      const shareData = navigator.canShare && navigator.canShare({ files: [file] })
        ? { files: [file], title: '標注圖片' }
        : { title: '標注圖片' };
      await navigator.share(shareData);
    } catch (e) {
      if (e.name !== 'AbortError') doDownload();
    }
  });
}

async function doCopy() {
  if (!needImg()) return;
  try {
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    showToast('已複製到剪貼簿');
  } catch {
    doDownload();
  }
}

// ─── Draft ────────────────────────────────────────────────────────────────────
const DKEY = 'od-annotator-v1';

function saveDraft() {
  if (!needImg()) return;
  const payload = {
    img: canvas.toDataURL('image/jpeg', 0.82),
    a: S.annotations,
    n: S.numCount,
    ts: Date.now(),
  };
  try {
    localStorage.setItem(DKEY, JSON.stringify(payload));
    showToast('草稿已儲存');
  } catch {
    showToast('儲存失敗（空間不足）');
  }
}

function checkDraftBanner() {
  try {
    const raw = localStorage.getItem(DKEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    const dt = new Date(d.ts);
    const fmt = `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
    document.getElementById('draft-msg').textContent = `發現草稿（${fmt}），是否繼續編輯？`;
    document.getElementById('draft-banner').classList.add('show');
  } catch {}
}

function restoreDraft() {
  dismissDraft();
  try {
    const d = JSON.parse(localStorage.getItem(DKEY));
    const img = new Image();
    img.onload = () => {
      S.img = img; S.annotations = d.a || []; S.numCount = d.n || 1;
      S.undoStack = []; S.redoStack = [];
      const MAX=4096; let w=img.naturalWidth, h=img.naturalHeight;
      if (w>MAX||h>MAX) { const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
      canvas.width=w; canvas.height=h;
      canvas.style.display='block'; upPmt.classList.add('hidden');
      render(); showToast('草稿已還原');
    };
    img.src = d.img;
  } catch { showToast('草稿還原失敗'); }
}

function dismissDraft() { document.getElementById('draft-banner').classList.remove('show'); }
function clearDraft() { localStorage.removeItem(DKEY); showToast('草稿已刪除'); }

// ─── Selection Helper Functions ───────────────────────────────────────────────
function deleteSelected() {
  if (S.selectedIdx === -1) return;
  pushUndo();
  S.annotations.splice(S.selectedIdx, 1);
  S.selectedIdx = -1;
  render();
  showToast('已刪除選取標記');
}

function getBoundingBox(a) {
  if (!a) return null;
  let minX, maxX, minY, maxY;
  if (a.type === 'text') {
    ctx.save();
    ctx.font = `bold ${a.fs}px Inter, system-ui, sans-serif`;
    const w = ctx.measureText(a.text).width;
    ctx.restore();
    const h = a.fs;
    minX = a.x - 6; maxX = a.x + w + 6;
    minY = a.y - h - 6; maxY = a.y + 6;
  } else if (a.type === 'num') {
    minX = a.x - a.r - 6; maxX = a.x + a.r + 6;
    minY = a.y - a.r - 6; maxY = a.y + a.r + 6;
  } else if (a.type === 'mosaic') {
    minX = a.x - 6; maxX = a.x + a.w + 6;
    minY = a.y - 6; maxY = a.y + a.h + 6;
  } else if (a.type === 'arrow' || a.type === 'circle' || a.type === 'rect') {
    minX = Math.min(a.x1, a.x2) - 8; maxX = Math.max(a.x1, a.x2) + 8;
    minY = Math.min(a.y1, a.y2) - 8; maxY = Math.max(a.y1, a.y2) + 8;
  } else if (a.type === 'free' || a.type === 'hi') {
    minX = Infinity; maxX = -Infinity; minY = Infinity; maxY = -Infinity;
    a.pts.forEach(pt => {
      if (pt.x < minX) minX = pt.x;
      if (pt.x > maxX) maxX = pt.x;
      if (pt.y < minY) minY = pt.y;
      if (pt.y > maxY) maxY = pt.y;
    });
    minX -= 8; maxX += 8; minY -= 8; maxY += 8;
  }
  return { minX, maxX, minY, maxY, w: maxX - minX, h: maxY - minY };
}

function findHitHandle(p, box) {
  const thresh = 10;
  const handles = {
    tl: { x: box.minX, y: box.minY },
    tr: { x: box.maxX, y: box.minY },
    bl: { x: box.minX, y: box.maxY },
    br: { x: box.maxX, y: box.maxY }
  };
  for (const [key, pt] of Object.entries(handles)) {
    if (Math.hypot(p.x - pt.x, p.y - pt.y) <= thresh) {
      return key;
    }
  }
  return null;
}

function updateSelectedProperty(prop, val) {
  if (S.selectedIdx === -1) return;
  const a = S.annotations[S.selectedIdx];
  if (prop === 'color') {
    a.color = val;
  } else if (prop === 'strokeW') {
    if (a.type === 'free' || a.type === 'hi') {
      a.w = val;
    } else if (a.type === 'num') {
      a.r = Math.max(16, val * 5);
    } else if (a.type === 'arrow' || a.type === 'circle' || a.type === 'rect') {
      a.w = val;
    }
  } else if (prop === 'fontSize') {
    if (a.type === 'text') {
      a.fs = val;
    }
  }
  render();
}

function syncControlsFromSelected() {
  if (S.selectedIdx === -1) return;
  const a = S.annotations[S.selectedIdx];
  if (!a) return;
  
  if (a.color) {
    S.color = a.color;
    document.querySelectorAll('.csw, .m-csw').forEach(sw => sw.classList.toggle('sel', sw.dataset.c === a.color));
    document.getElementById('custom-col').value = a.color;
    document.getElementById('m-custom-col').value = a.color;
  }
  
  let strokeVal = null;
  if (a.type === 'arrow' || a.type === 'circle' || a.type === 'rect' || a.type === 'free' || a.type === 'hi') {
    strokeVal = a.w;
  } else if (a.type === 'num') {
    strokeVal = Math.round(a.r / 5);
  }
  if (strokeVal !== null) {
    S.strokeW = strokeVal;
    document.getElementById('stroke-w').value = strokeVal;
    document.getElementById('stroke-v').textContent = strokeVal;
    document.getElementById('m-stroke').value = strokeVal;
    document.getElementById('m-stroke-v').textContent = strokeVal;
  }
  
  if (a.type === 'text') {
    S.fontSize = a.fs;
    document.getElementById('font-sz').value = a.fs;
    document.getElementById('font-v').textContent = a.fs;
  }
}

function selectAnnotation(idx) {
  S.selectedIdx = idx;
  syncControlsFromSelected();
  render();
}

function findHitAnnotation(p) {
  for (let i = S.annotations.length - 1; i >= 0; i--) {
    if (checkHit(S.annotations[i], p)) return i;
  }
  return -1;
}

function checkHit(a, p) {
  const delta = 8;
  switch (a.type) {
    case 'num':
      return Math.hypot(p.x - a.x, p.y - a.y) <= a.r;
    case 'text': {
      ctx.save();
      ctx.font = `bold ${a.fs}px Inter, system-ui, sans-serif`;
      const w = ctx.measureText(a.text).width;
      ctx.restore();
      const h = a.fs;
      return p.x >= a.x - 4 && p.x <= a.x + w + 4 &&
             p.y >= a.y - h - 4 && p.y <= a.y + 4;
    }
    case 'mosaic':
      return p.x >= a.x && p.x <= a.x + a.w &&
             p.y >= a.y && p.y <= a.y + a.h;
    case 'rect': {
      const minX = Math.min(a.x1, a.x2), maxX = Math.max(a.x1, a.x2);
      const minY = Math.min(a.y1, a.y2), maxY = Math.max(a.y1, a.y2);
      return p.x >= minX - delta && p.x <= maxX + delta &&
             p.y >= minY - delta && p.y <= maxY + delta;
    }
    case 'circle': {
      const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
      const rx = Math.max(1, Math.abs(a.x2 - a.x1) / 2), ry = Math.max(1, Math.abs(a.y2 - a.y1) / 2);
      const dx = p.x - cx, dy = p.y - cy;
      const val = (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry);
      return val <= 1.1;
    }
    case 'arrow':
      return distToSeg(p, { x: a.x1, y: a.y1 }, { x: a.x2, y: a.y2 }) <= Math.max(8, a.w * 2);
    case 'free':
    case 'hi': {
      for (let i = 0; i < a.pts.length - 1; i++) {
        if (distToSeg(p, a.pts[i], a.pts[i+1]) <= Math.max(10, a.w * 1.5)) {
          return true;
        }
      }
      return false;
    }
  }
  return false;
}

function distToSeg(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => toastEl.classList.remove('show'), 2200);
}
</script>
